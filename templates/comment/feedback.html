<h2>All Feedback</h2>

<div style="display:flex; flex-direction:column; gap:20px;">

{% for comment in comments %}

<div style="border:1px solid #ccc; padding:20px; width:400px;">

<h3>{{ comment.name }}</h3>

<p>{{ comment.text }}</p>

{% if comment.avatar %}
<img src="{{ comment.avatar }}" width="60">
{% endif %}

<p>{{ comment.created_at }}</p>

</div>

{% endfor %}

</div>
